<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>GoFast - Building Blocks for Go</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Generate production-ready Go apps with ConnectRPC, SvelteKit, and PostgreSQL. One CLI to scaffold your entire stack — auth, payments, monitoring, and more." />
		<link rel="canonical" href="https://gofast.live" />
		<link rel="icon" type="image/svg" href="%sveltekit.assets%/logo.svg" />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://gofast.live" />

		<meta property="og:description" content="Generate production-ready Go apps with ConnectRPC, SvelteKit, and PostgreSQL. One CLI to scaffold your entire stack." />

		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:site_name" content="GoFast" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="GoFast - Building Blocks for Go" />
		<meta name="twitter:description" content="Generate production-ready Go apps with ConnectRPC, SvelteKit, and PostgreSQL. One CLI to scaffold your entire stack." />
		<meta name="twitter:image" content="https://gofast.live/og-image.webp" />

		<!-- Structured Data -->
		<script type="application/ld+json">
		{
			"@context": "https://schema.org",
			"@graph": [
				{
					"@type": "WebSite",
					"name": "GoFast",
					"url": "https://gofast.live"
				},
				{
					"@type": "SoftwareApplication",
					"name": "GoFast CLI",
					"applicationCategory": "DeveloperApplication",
					"operatingSystem": "Linux, macOS",
					"description": "Generate production-ready Go apps with ConnectRPC, SvelteKit, and PostgreSQL. One CLI to scaffold your entire stack — auth, payments, monitoring, and more.",

						"@type": "Offer",
						"price": "0",
						"priceCurrency": "USD"
					}
				}
			]
		}
		</script>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
